# landing.yaml — Caso Codelco Andina (demo control de polvo respirable en ventilación minera)
#
# Fuentes:
#   1) Planilla Excel "Puntos Criticos Semana 19 2026 LIMPIO.xlsx", exportada
#      a CSV por hoja (9 áreas de planta). Estructura: fila 1 = título, fila 2
#      = números de semana como encabezados (semanas 1..52 de 2025 + 1..19 de
#      2026), filas siguientes mezclan metadatos (operador, técnico, fecha,
#      horario) con valores de concentración por punto de medición.
#
#   2) Planilla Excel "Programa Semana 21 2026 Ventilacion LIMPIO.xlsx",
#      exportada a CSV por hoja (4 hojas: Programa, Chancado Fino, Molienda,
#      Chancado Primario). Listado de Órdenes de Trabajo programadas con
#      datos de planificación y ejecución real.
#
# El modelo dbt bronce de cada fuente maneja el parseo de esta estructura.
# Para mediciones, schema_columnas declara solo la columna de etiqueta
# (primera columna); las columnas de semana se procesan via SELECT * en
# bronce. Para OT, schema_columnas declara las columnas del header de la
# hoja.
#
# Hard rules aplicadas en los CSV (DV Guru):
#   - Cast a texto + trim + UPPER en BK (Orden, Ubicación técnica, etc.)
#   - Coalesce NULL → -1 en BK (zero-key)
#   - Fechas en ISO 8601 + Z (UTC): YYYY-MM-DDTHH:MM:SSZ
#   - Encoding UTF-8
#
# Patrón de ingesta: overwrite + snapshot (Camino A).
# DEUDA: no escala con el tiempo — ver docs/preguntas.md.
#
# Ruta de datos en el contenedor: montar ./datos en /datos al correr docker.
#   docker run -v ./datos:/datos -v ./configuracion:/app/configuracion ...

version: "1.2"
metadata:
  cliente_id: codelco_andina
  descripcion: Mediciones de polvo respirable y Órdenes de Trabajo de ventilación minera

landing:
  # =====================================================================
  # Fiscalización — mediciones de polvo respirable por área de planta
  # Origen: Puntos_Criticos_Semana_19_2026_LIMPIO.xlsx
  # =====================================================================
  - nombre: puntos_prechancado
    lakehouse: duckdb
    descripcion: Mediciones semanales de polvo respirable — área Prechancado
    formato: csv
    ubicacion: /datos/csv/Prechancado.csv
    schema_columnas:
      - {nombre: etiqueta, tipo: string, nullable: true}
    frecuencia: {tipo: batch, cron: "0 8 * * 1"}
    ingestion_pattern: overwrite
    frecuencia_actualizacion: semanal
    enable_snapshots: true
    snapshot_strategy: check_cols
    snapshot_check_cols: [etiqueta]

  - nombre: puntos_chancado_2_3
