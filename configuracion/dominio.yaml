# domain.yaml — Caso Minera (prueba)
#
# Dominio: seguridad ocupacional — concentración de polvo respirable.
# Nota: los campos operador y tecnico contienen nombres de personas.
# Para este caso de prueba se tratan como datos operacionales (no PII).
# Evaluar tokenización en producción real.

version: "1.0"
metadata:
  cliente_id: minera_prueba
  descripcion: Mediciones ambientales de polvo respirable por área de planta minera

chunks:
  valido_hasta_default: -1   # -1 = sin expiración (sentinel)

hashing:
  rules:
    algoritmo: sha256_truncado_16
    normalizacion: json_canonico

dimensiones_de_gobernanza:
  planta:
    tipo: enum
    valores:
      - Pre-Chancado
      - Chancado 2° y 3°
      - Chancado Fino 3°
      - Chancado Fino 4°
      - Molienda SAG
      - Molienda Convencional
      - CDM
      - Nodo 3500

  ambito:
    tipo: enum
    valores:
      - seguridad_ocupacional
      - medioambiente

  clasificacion:
    tipo: enum
    valores:
      - interno
      - restringido

smoke_test_contract:
  campos_requeridos_obligatorio: true

chunk_contract:
  campos_planos:
    - chunk_id
    - regla_id
    - fecha_creacion
    - corrida_id
    - transform_hash
    - dimensiones
    - dimensiones_en_texto
    - valido_hasta
    - politica_vigencia
    - pii_estrategia
    - pii_tokens
    - estrategia_olvido
    - hash_contenido
    - firma_hmac
  campos_cifrados:
    bloque: cifrado
    campos:
      - texto
      - datos_negocio
      - dek_cifrada
      - kek_version
