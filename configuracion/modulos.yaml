version: "1.0"
modulos:
  ma:
    habilitado: true
    base_url: http://localhost:8001
    endpoints:
      - {metodo: POST, path: /auth/login,    descripcion: Login con credenciales}
      - {metodo: POST, path: /auth/refresh,  descripcion: Renovar token}
      - {metodo: POST, path: /auth/logout,   descripcion: Cerrar sesion}
      - {metodo: GET,  path: /capabilities,  descripcion: Capacidades del sistema para la UI}
      - {metodo: GET,  path: /jwks,          descripcion: Claves publicas JWT}
  m2:
    habilitado: true
    base_url: http://localhost:8000
    endpoints:
      - {metodo: POST,   path: /api/chat/preguntar,             descripcion: Enviar pregunta al agente RAG}
      - {metodo: GET,    path: /api/chat/conversaciones,        descripcion: Listar conversaciones}
      - {metodo: POST,   path: /api/chat/conversaciones,        descripcion: Crear conversacion}
      - {metodo: DELETE, path: "/api/chat/conversaciones/{id}", descripcion: Eliminar conversacion}
  m3:
    habilitado: true
    base_url: http://localhost:8003
    endpoints:
      - {metodo: GET,  path: /reportes/,                      descripcion: Listar reportes accesibles}
      - {metodo: POST, path: "/reportes/{id}/generar",        descripcion: Generar reporte (JSON o Excel)}
  m4:
    habilitado: false
    base_url: null
    endpoints: []
  m5:
    habilitado: false
    base_url: null
    endpoints: []
