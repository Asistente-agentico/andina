# permisos.yaml — Usuarios de test para suite E2E de minera.
#
# Las contraseñas NO están aquí (Ley 21.719). Se almacenan como bcrypt
# hashes en env vars MA_USER_HASH_<base64url(user_id)> al ejecutar tests.
# En producción, este archivo contiene los usuarios reales del cliente.

separador_contexto_pares: "_._"
separador_contexto_dim_valor: ":::"

dimensiones:
  planta:
    tipo: enum
    nombre_ui: "Planta"
    valores:
      - prechancado
      - nodo_3500
      - chancado_2y3
      - chancado_fino_3
      - chancado_fino_4
      - molienda_sag
      - molienda_convencional
      - molienda_cdm
    nombres_ui_valores:
      prechancado: "Pre-chancado"
      nodo_3500: "Nodo 3500"
      chancado_2y3: "Chancado 2° y 3°"
      chancado_fino_3: "Chancado fino 3°"
      chancado_fino_4: "Chancado fino 4°"
      molienda_sag: "Molienda SAG"
      molienda_convencional: "Molienda convencional"
      molienda_cdm: "CDM"

    grupos:
      chancado:
        - prechancado
        - nodo_3500
        - chancado_2y3
        - chancado_fino_3
        - chancado_fino_4
      molienda:
        - molienda_sag
        - molienda_convencional
        - molienda_cdm
      todas:
        - prechancado
        - nodo_3500
        - chancado_2y3
        - chancado_fino_3
        - chancado_fino_4
        - molienda_sag
        - molienda_convencional
        - molienda_cdm
  
  ambito:
    tipo: enum
    nombre_ui: "Ámbito"
    valores:
      - seguridad_ocupacional
      - medioambiente
    nombres_ui_valores:
      seguridad_ocupacional: "Seguridad ocupacional"
      medioambiente: "Medioambiente"
    grupos:
      todos:
        - seguridad_ocupacional
        - medioambiente

  clasificacion:
    tipo: ordinal
    nombre_ui: "Clasificación"
    valores:
      - publico
      - interno
      - restringido
      - solo_gerencias
    nombres_ui_valores:
      publico: "Público"
      interno: "Interno"
      restringido: "Restringido"
      solo_gerencias: "Solo gerencias"

arboles_contextos:
  - id: AC0001
    nombre_ui: "Árbol principal"
    niveles:
      - dimension: ambito
      - dimension: planta

usuarios:
  - user_id: "jefe.seguridad@test"
    nombre_ui: "Jefe de Seguridad"
    tipo: cliente
    arbol_id: AC0001
    permisos:
      chat: [consumir]
      reportes: [consumir]
    gobernanza:
      dimensiones:
        planta: ["todas"]
        ambito: ["seguridad_ocupacional"]
        clasificacion: "restringido"

  - user_id: "operador.chancado@test"
    nombre_ui: "Operador Chancado"
    tipo: cliente
    arbol_id: AC0001
    permisos:
      chat: [consumir]
      reportes: [consumir]
    gobernanza:
      dimensiones:
        planta: [chancado]
        ambito: [medioambiente]
        clasificacion: "interno"

  - user_id: "auditor.ambiental@test"
    nombre_ui: "Auditor Ambiental"
    tipo: cliente
    arbol_id: AC0001
    permisos:
      chat: [consumir]
      reportes: [consumir]
    gobernanza:
      dimensiones:
        planta: [todas]
        ambito: [todos]
        clasificacion: "restringido"

  - user_id: "tecnico.medioambiente.molienda@test"
    nombre_ui: "Técnico Medioambiente Molienda"
    tipo: cliente
    arbol_id: AC0001
    permisos:
      chat: [consumir]
      reportes: [consumir]
    gobernanza:
      dimensiones:
        planta: [molienda]
        ambito: [medioambiente]
        clasificacion: "interno"
